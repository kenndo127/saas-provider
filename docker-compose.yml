services:
  postgres:
    image: postgres:16-alpine
    #platform: linux/amd64
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:4.8.1
    #platform: linux/amd64
    restart: always
    ports:
      - "8081:8080"

volumes:
  pgdata: